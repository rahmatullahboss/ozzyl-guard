name: Format webhook hardening

on:
  push:
    branches: [ai/webhook-outbox-runner-20260717]
    paths:
      - .github/workflows/format-webhook-hardening.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/webhook-outbox-runner-20260717
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx prettier --write workers/event-worker/src/index.ts workers/event-worker/src/index.test.ts workers/event-worker/src/runner.ts
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workers/event-worker/src/index.ts workers/event-worker/src/index.test.ts workers/event-worker/src/runner.ts
          git commit -m "style: format webhook hardening"
          git push origin HEAD:ai/webhook-outbox-runner-20260717
