name: Finalize managed envelope lint fix

on:
  push:
    branches: [ai/managed-envelope-boundary-20260717]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Replace control-character helper
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('packages/encryption/src/index.ts')
          lines = path.read_text().splitlines()
          signature = 'function hasControlCharacter(value: string): boolean {'
          matches = [index for index, line in enumerate(lines) if line == signature]
          if len(matches) != 1:
            raise SystemExit(f'Expected one helper signature; found {len(matches)}')
          index = matches[0]
          if index + 2 >= len(lines) or not lines[index + 1].strip().startswith('return /[') or lines[index + 2] != '}':
            raise SystemExit('Unexpected helper body')
          replacement = [
            signature,
            '  for (let index = 0; index < value.length; index += 1) {',
            '    const code = value.charCodeAt(index);',
            '    if (code <= 31 || code === 127) return true;',
            '  }',
            '  return false;',
            '}',
          ]
          lines[index:index + 3] = replacement
          path.write_text('\n'.join(lines) + '\n')
          PY
      - run: npx prettier --write packages/encryption/src/index.ts
      - name: Validate managed envelope sources
        run: |
          set +e
          {
            npx eslint packages/encryption/src/index.ts packages/encryption/src/index.test.ts --max-warnings=0
            npm run typecheck -w @ozzyl/encryption
            npm run test -w @ozzyl/encryption
          } > /tmp/managed-envelope-finalize.log 2>&1
          status=$?
          cat /tmp/managed-envelope-finalize.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/managed-envelope-finalize.log .ai-bridge/tmp-managed-envelope-finalize.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f .ai-bridge/tmp-managed-envelope-finalize.log
            git commit -m "test: capture managed envelope validation failure"
            git push origin HEAD:${{ github.ref_name }}
            exit "$status"
          fi
      - name: Commit production-only fix
        run: |
          rm -f .ai-bridge/tmp-managed-envelope-lint.log
          rm -f .ai-bridge/tmp-managed-envelope-finalize.log
          rm -f .github/workflows/tmp-diagnose-managed-envelope-lint.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: validate envelope identifiers without control regex"
          git push origin HEAD:${{ github.ref_name }}
