name: Durable Work Evidence Sync PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.ref == 'docs/durable-work-dead-letter-evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/durable-work-dead-letter-evidence
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Extract and run evidence transformation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/evidence-sync.yml').read_text()
          start = workflow.index("          python3 - <<'PY'\n") + len("          python3 - <<'PY'\n")
          end = workflow.index("\n          PY\n", start)
          script = textwrap.dedent(workflow[start:end])
          Path('/tmp/evidence-sync.py').write_text(script + '\n')
          PY
          python3 /tmp/evidence-sync.py
      - name: Format tracker
        run: npx prettier --write tracker.yml
      - name: Format current plan
        run: npx prettier --write .ai-bridge/current-plan.md
      - name: Format implementation status
        run: npx prettier --write .ai-bridge/implementation-status.md
      - name: Format decisions
        run: npx prettier --write .ai-bridge/decisions.md
      - name: Format documentation index
        run: npx prettier --write docs/README.md
      - name: Format continuation bundle note
        run: npx prettier --write .ai-bridge/pro-context.md
      - run: npm run format:check && npm run db:check
      - name: Commit final evidence files
        run: |
          rm .github/workflows/evidence-sync.yml
          rm .github/workflows/evidence-sync-pr.yml
          rm .ai-bridge/evidence-sync-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.yml README.md docs .ai-bridge .github/workflows/evidence-sync.yml .github/workflows/evidence-sync-pr.yml
          git commit -m "docs: sync durable work dead-letter evidence"
          git push origin HEAD:docs/durable-work-dead-letter-evidence
