              '11. `0011_native_shadow_pilot.sql`\n12. `0012_durable_work_replays.sql`\n',
          )
          replace('.ai-bridge/implementation-status.md', '- `npm run db:check`: eleven migrations and committed SHA-256 manifest validated', '- `npm run db:check`: twelve migrations and committed SHA-256 manifest validated')
          replace('.ai-bridge/implementation-status.md', '- `npm run test`: 28/28 Turbo tasks passed; repository contains 120 assertions', '- `npm run test`: 28/28 Turbo tasks passed; repository contains 126 assertions')
          replace(
              '.ai-bridge/implementation-status.md',
              '- The verified selected-source shadow pilot foundation was squash-merged through PR #20 to `main` as `c478170c7dadbeafa576a62ae989df682e052d4e`\n',
              '- The verified selected-source shadow pilot foundation was squash-merged through PR #20 to `main` as `c478170c7dadbeafa576a62ae989df682e052d4e`\n'
