              '  - tenant_scoped_durable_work_dead_letter_inspection\n'
              '  - idempotent_controlled_durable_work_replay\n'
              '  - immutable_secret_free_durable_work_replay_evidence\n',
          )
          replace('tracker.yml', '    migrations: 11_of_11_with_sha256_manifest\n', '    migrations: 12_of_12_with_sha256_manifest\n')
          replace('tracker.yml', '    remote_assertions: 120_passed\n', '    remote_assertions: 126_passed\n')
          replace('tracker.yml', '    postgresql_runtime_role_tests: 6_of_6_passed\n', '    postgresql_runtime_role_tests: 7_of_7_passed\n')
          replace(
              'tracker.yml',
              '    native_shadow_total_tests: 28_of_28_passed\n',
              '    native_shadow_total_tests: 28_of_28_passed\n'
