name: Durable Work Evidence Sync

on:
  push:
    branches: [docs/durable-work-dead-letter-evidence]

permissions:
  contents: write

jobs:
  sync:
    if: github.event.head_commit.message != 'docs: sync durable work dead-letter evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/durable-work-dead-letter-evidence
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Sync evidence
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'missing replacement in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new))

          replace(
              'tracker.yml',
              '  - shadow_comparison_guard_values_are_derived_from_the_scoped_assessment\n',
              '  - shadow_comparison_guard_values_are_derived_from_the_scoped_assessment\n'
              '  - durable_dead_letter_operations_require_active_owner_or_admin_scope\n'
              '  - durable_work_replay_is_explicit_idempotent_and_audited\n'
