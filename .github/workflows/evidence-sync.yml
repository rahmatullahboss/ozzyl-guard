          pro = Path('.ai-bridge/pro-context.md')
          pro_text = pro.read_text()
          marker = '# Ozzyl Guard — Selected Source Shadow Pilot Continuation Context\n'
          note = (
              marker
              + '\n> Refresh pending (2026-07-18): this GitHub-only milestone could not run the repository-local exporter. '
              + 'Canonical tracker, plan, status, decisions, ADR 0012, runbook, tests, and migration evidence are current through feature merge '
              + '`2d686206456960bf9b3e14571e3bf2c9169d94f9`; regenerate this bundle locally before relying on embedded repository snapshots.\n'
          )
          if marker not in pro_text:
              raise SystemExit('pro-context title marker missing')
          pro.write_text(pro_text.replace(marker, note, 1))

          roots = [Path('README.md'), Path('docs'), Path('.ai-bridge')]
          files = []
          for root in roots:
              if root.is_file():
                  files.append(root)
              else:
                  files.extend(p for p in root.rglob('*.md') if p.name != 'pro-context.md')
          count = 0
          broken = []
          for file in files:
              text = file.read_text(errors='ignore')
              for target in re.findall(r'\[[^\]]+\]\(([^)]+)\)', text):
                  target = target.strip().split('#', 1)[0]
                  if not target or '://' in target or target.startswith('mailto:'):
                      continue
                  count += 1
                  if not (file.parent / target).resolve().exists():
                      broken.append((str(file), target))
          if broken:
              raise SystemExit(f'broken documentation links: {broken}')
          tracker = Path('tracker.yml')
          tracker_text = tracker.read_text()
          tracker_text = re.sub(
              r'    documentation_links: \d+_reviewed_0_known_broken',
              f'    documentation_links: {count}_reviewed_0_known_broken',
              tracker_text,
          )
          tracker.write_text(tracker_text)
          print(f'documentation links reviewed: {count}')
