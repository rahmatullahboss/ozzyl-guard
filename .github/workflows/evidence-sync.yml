      - name: Commit evidence
        run: |
          rm .github/workflows/evidence-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.yml README.md docs .ai-bridge .github/workflows/evidence-sync.yml
          git commit -m "docs: sync durable work dead-letter evidence"
          git push origin HEAD:docs/durable-work-dead-letter-evidence
