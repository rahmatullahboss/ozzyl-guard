              '- Seven runtime-role tests now include insert-only replay-ledger privileges alongside migration-history, DELETE, DDL, ownership, and elevated-role denials\n'
              '- Durable-work dead-letter final run `29644234591`, job `88079650134`: twelve migrations, 19 typechecks, 28 test tasks with 126 assertions, 19 builds, audit, formatting, lint, clean restore, runtime-role grants, architecture, and PHP lint passed at head `a1419a2889701bcb6c05b686ac4b1eeb6e9d5d12`\n'
              '- The verified durable-work dead-letter operations milestone was squash-merged through PR #22 to `main` as `2d686206456960bf9b3e14571e3bf2c9169d94f9`\n',
          )
          replace('.ai-bridge/implementation-status.md', '- Six database-role tests cover identifier safety, explicit policy completeness, real allowed DML, migration-history/DELETE/DDL denial, elevated-role rejection, and inherited-role rejection', '- Seven database-role tests cover identifier safety, explicit policy completeness, insert-only replay evidence, real allowed DML, migration-history/DELETE/DDL denial, elevated-role rejection, and inherited-role rejection')
          replace(
              '.ai-bridge/implementation-status.md',
              'The repository-local exporter refreshed `.ai-bridge/pro-context.md` after canonical `main` advanced to the selected-source shadow pilot merge.',
              'The current GitHub-only environment cannot run the repository-local exporter. `.ai-bridge/pro-context.md` is explicitly marked pending local refresh; tracker, plan, status, decisions, and milestone documentation are current.',
          )
          replace(
              '.ai-bridge/implementation-status.md',
              '- Durable PostgreSQL work still needs broader dead-letter/replay operations and future lease renewal for work whose bounded execution may exceed one lease.',
              '- Controlled dead-letter inspection and replay are implemented; future work still includes lease renewal for executions that may exceed one lease, retention policy, and a browser operations surface that preserves the same authorization and secret-free boundaries.',
          )

          replace(
              '.ai-bridge/decisions.md',
              '38. The selected source integration invokes shadow only after an authoritative persisted-order reload and exact organization/store/order revalidation. PostgreSQL rollout state defaults to `off`; only a CSRF-protected active owner/admin can opt in an exact store. Every selected success, timeout, assessment failure, or comparison persistence failure produces tenant-scoped immutable attempt evidence and bounded secret-free reporting. No enforcement mode exists, and production deployment remains limited to explicitly selected pilot stores.\n',
