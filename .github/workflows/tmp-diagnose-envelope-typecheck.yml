name: Finalize envelope type correction

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'ai/managed-envelope-boundary-20260717'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Preserve AES algorithm as a literal type
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('packages/encryption/src/index.ts')
          text = path.read_text()
          old = "const AES_ALGORITHM: CipherGCMTypes = 'aes-256-gcm';"
          new = "const AES_ALGORITHM = 'aes-256-gcm' as const;"
          if text.count(old) != 1:
            raise SystemExit(f'Expected one AES algorithm declaration; found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
      - run: npx prettier --write packages/encryption/src/index.ts
      - name: Validate full workspace
        run: |
          set +e
          {
            npm run lint
            npm run typecheck
            npm run test
            npm run build
          } > /tmp/envelope-validation.log 2>&1
          status=$?
          cat /tmp/envelope-validation.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/envelope-validation.log .ai-bridge/tmp-envelope-validation.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f .ai-bridge/tmp-envelope-validation.log
            git commit -m "test: capture managed envelope validation failure"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi
      - name: Commit production-only correction
        run: |
          rm -f .ai-bridge/tmp-envelope-typecheck.log
          rm -f .ai-bridge/tmp-envelope-validation.log
          rm -f .github/workflows/tmp-diagnose-envelope-typecheck.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve managed envelope algorithm literal type"
          git push origin HEAD:${{ github.head_ref }}
