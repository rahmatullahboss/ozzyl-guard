name: Diagnose envelope workspace typecheck

on:
  push:
    branches: [ai/managed-envelope-boundary-20260717]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Capture workspace typecheck
        run: |
          set +e
          npm run typecheck > .ai-bridge/tmp-envelope-typecheck.log 2>&1
          status=$?
          cat .ai-bridge/tmp-envelope-typecheck.log
          if [ "$status" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f .ai-bridge/tmp-envelope-typecheck.log
            git commit -m "test: capture envelope workspace typecheck failure"
            git push origin HEAD:${{ github.ref_name }}
          fi
          exit "$status"
