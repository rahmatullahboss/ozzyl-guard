name: Implement native shadow rollout

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  implement:
    if: github.head_ref == 'ai/native-shadow-rollout-20260718'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzyl_guard
          POSTGRES_PASSWORD: ozzyl_guard
          POSTGRES_DB: ozzyl_guard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ozzyl_guard -d ozzyl_guard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_test
      RESTORE_DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_restore_test
      RESTORE_REHEARSAL_VERIFY_DATA_HASHES: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: sodium
      - run: npm ci --no-audit --no-fund
      - name: Apply native shadow wiring
        run: python3 scripts/tmp-native-shadow-patch.py
      - name: Remove temporary implementation tooling
        run: |
          rm -f scripts/tmp-native-shadow-patch.py
          rm -f .github/workflows/tmp-native-shadow-implementation.yml
      - name: Format changed source and documentation
        run: >-
          npx prettier --write
          packages/shared-types/src/index.ts
          packages/sdk/src/index.ts
          packages/database/src/schema.ts
          packages/database/src/runtime-role.ts
          packages/database/migrations/manifest.json
          apps/api/src/index.ts
          apps/api/src/server.ts
          apps/api/src/bootstrap.ts
          apps/api/src/postgres-shadow-comparisons.ts
          apps/api/src/native-shadow.test.ts
          apps/api/src/postgres-shadow-comparisons.test.ts
          integrations/multi-store-saas/src/index.ts
          integrations/multi-store-saas/src/index.test.ts
          docs/api/api-specification.md
          docs/integrations/integrations.md
          docs/database/database-design.md
          .ai-bridge/decisions.md
      - run: npm audit --audit-level=high
      - run: npm run format:check
      - run: npm run lint
      - run: npm run db:check
      - run: npm run db:migrate
      - name: Verify migration replay
        run: npm run db:migrate
      - name: Verify migration history integrity
        run: npm run db:integrity
      - name: Create clean restore target
        run: >-
          psql postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/postgres
          --set ON_ERROR_STOP=1
          --command 'create database ozzyl_guard_restore_test'
      - name: Rehearse clean backup and restore
        run: npm run db:restore-rehearsal
      - name: Verify runtime database role grants
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: ozzyl_guard
          PGPASSWORD: ozzyl_guard
          PGDATABASE: ozzyl_guard_test
          DATABASE_RUNTIME_ROLE: ozzyl_guard_runtime_ci
        run: |
          cleanup() {
            psql --set ON_ERROR_STOP=1 --command 'drop owned by ozzyl_guard_runtime_ci' >/dev/null 2>&1 || true
            psql --set ON_ERROR_STOP=1 --command 'drop role if exists ozzyl_guard_runtime_ci' >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          psql --set ON_ERROR_STOP=1 --command 'create role ozzyl_guard_runtime_ci login nosuperuser nocreatedb nocreaterole noinherit noreplication nobypassrls'
          npm run db:runtime-grants
      - run: npm run check:architecture
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: php -l integrations/woocommerce/ozzyl-guard.php
      - name: Commit production implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add native shadow rollout evidence"
          git push origin HEAD:${{ github.head_ref }}
