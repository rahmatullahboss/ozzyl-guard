name: Apply verification queue hardening

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'ai/verification-queue-runner-20260717'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzyl_guard
          POSTGRES_PASSWORD: ozzyl_guard
          POSTGRES_DB: ozzyl_guard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ozzyl_guard -d ozzyl_guard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: python3 scripts/tmp-verification-hardening.py
      - run: >-
          npx prettier --write
          workers/verification-worker/src/postgres.ts
          workers/verification-worker/src/postgres.test.ts
          workers/verification-worker/src/payload.ts
          workers/verification-worker/src/payload.test.ts
          workers/verification-worker/src/runner.ts
          docker-compose.yml
      - run: npm run db:check
      - run: npm run db:migrate
      - name: Verify migration replay
        run: npm run db:migrate
      - run: npm run typecheck --workspace @ozzyl/verification-worker
      - run: npm run typecheck --workspace @ozzyl/api
      - run: npx turbo run test --filter=@ozzyl/verification-worker
      - run: npx turbo run test --filter=@ozzyl/api
      - run: npm run build --workspace @ozzyl/verification-worker
      - run: npm run build --workspace @ozzyl/api
      - name: Verify verification compose profile
        env:
          POSTGRES_PASSWORD: test
          API_KEY_PEPPER: test
          SESSION_PEPPER: test
          SESSION_CSRF_SECRET: test
          PHONE_HMAC_KEY: test
          OTP_HASH_SECRET: test
          CREDENTIAL_ENCRYPTION_KEY: test
        run: docker compose --profile verification config >/dev/null
      - name: Commit verified hardening
        run: |
          rm scripts/tmp-verification-hardening.py
          rm .github/workflows/apply-verification-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden verification delivery scope and payloads"
          git push origin HEAD:${{ github.head_ref }}
