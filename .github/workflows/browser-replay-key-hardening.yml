name: Browser Replay Key Hardening

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  harden:
    if: github.event.pull_request.head.ref == 'feat/browser-dead-letter-operations'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/browser-dead-letter-operations
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: python3 .github/scripts/harden-browser-replay-key.py
      - run: npm run format
      - run: npm run typecheck -w @ozzyl/dashboard
      - run: npm run build -w @ozzyl/dashboard
      - name: Commit hardening
        run: |
          rm .github/workflows/browser-replay-key-hardening.yml
          rm .github/scripts/harden-browser-replay-key.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: keep browser replay keys synchronous"
          git push origin HEAD:feat/browser-dead-letter-operations
