name: Capture restore integrity lint

on:
  push:
    branches: [ai/postgres-restore-integrity-20260717]
    paths:
      - .github/workflows/capture-restore-lint.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/postgres-restore-integrity-20260717
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Capture lint output
        run: |
          set +e
          npm run lint > /tmp/restore-lint.log 2>&1
          status=$?
          cat /tmp/restore-lint.log
          if [ "$status" -ne 0 ]; then
            tail -n 300 /tmp/restore-lint.log > .ai-bridge/tmp-restore-lint.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f .ai-bridge/tmp-restore-lint.log
            git commit -m "test: capture restore integrity lint output"
            git push origin HEAD:ai/postgres-restore-integrity-20260717
            exit "$status"
          fi
