          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one match in {path}; found {count}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1))

