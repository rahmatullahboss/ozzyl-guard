name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzyl_guard
          POSTGRES_PASSWORD: ozzyl_guard
          POSTGRES_DB: ozzyl_guard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ozzyl_guard -d ozzyl_guard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_test
      RESTORE_DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_restore_test
      RESTORE_REHEARSAL_VERIFY_DATA_HASHES: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: sodium
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run format:check
      - run: npm run lint
      - run: npm run db:check
      - run: npm run db:migrate
      - name: Verify migration replay
        run: npm run db:migrate
      - name: Verify migration history integrity
        run: npm run db:integrity
      - name: Create clean restore target
        run: >-
          psql postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/postgres
          --set ON_ERROR_STOP=1
          --command 'create database ozzyl_guard_restore_test'
      - name: Rehearse clean backup and restore
        run: npm run db:restore-rehearsal
      - run: npm run check:architecture
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: php -l integrations/woocommerce/ozzyl-guard.php
