name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzyl_guard
          POSTGRES_PASSWORD: ozzyl_guard
          POSTGRES_DB: ozzyl_guard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ozzyl_guard -d ozzyl_guard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: sodium
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run format:check
      - run: npm run lint
      - run: npm run db:check
      - run: npm run db:migrate
      - name: Verify migration replay
        run: npm run db:migrate
      - run: npm run check:architecture
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: php -l integrations/woocommerce/ozzyl-guard.php
