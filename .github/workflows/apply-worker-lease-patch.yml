name: Apply worker lease patch

on:
  push:
    branches: [ai/worker-lease-recovery-20260717]
    paths:
      - scripts/tmp-worker-lease-patch.py
      - .github/workflows/apply-worker-lease-patch.yml
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'ai/worker-lease-recovery-20260717' || github.ref_name == 'ai/worker-lease-recovery-20260717'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzyl_guard
          POSTGRES_PASSWORD: ozzyl_guard
          POSTGRES_DB: ozzyl_guard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ozzyl_guard -d ozzyl_guard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/worker-lease-recovery-20260717
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: python3 scripts/tmp-worker-lease-patch.py
      - run: npx prettier --write packages/database/src/schema.ts workers/courier-sync-worker/src/postgres.ts workers/courier-sync-worker/src/postgres.test.ts workers/courier-sync-worker/src/runner.ts .github/workflows/ci.yml
      - run: npm run db:check
      - run: npm run db:migrate
      - run: npm run typecheck --workspace @ozzyl/courier-sync-worker
      - name: Run worker tests with captured output
        id: worker_tests
        continue-on-error: true
        run: |
          set -o pipefail
          npx turbo run test --filter=@ozzyl/courier-sync-worker 2>&1 | tee worker-test.log
      - uses: actions/upload-artifact@v4
        with:
          name: worker-lease-test-log
          path: worker-test.log
      - name: Fail when worker tests failed
        if: steps.worker_tests.outcome != 'success'
        run: exit 1
      - name: Commit worker lease hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/database/src/schema.ts workers/courier-sync-worker/src/postgres.test.ts .github/workflows/ci.yml workers/courier-sync-worker/src/postgres.ts workers/courier-sync-worker/src/runner.ts packages/database/migrations/0007_worker_leases.sql
          git commit -m "feat: harden courier worker leases"
          git push origin HEAD:ai/worker-lease-recovery-20260717
