name: Sync native shadow milestone documentation

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'ai/native-shadow-rollout-20260718'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Apply milestone documentation patch
        run: |
          set +e
          python3 scripts/tmp-native-shadow-docs.py > /tmp/native-shadow-docs.log 2>&1
          status=$?
          cat /tmp/native-shadow-docs.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/native-shadow-docs.log .ai-bridge/tmp-native-shadow-docs.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f .ai-bridge/tmp-native-shadow-docs.log
            git commit -m "test: capture native shadow docs sync failure"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi
      - name: Remove temporary documentation tooling
        run: |
          rm -f .ai-bridge/tmp-native-shadow-docs.log
          rm -f scripts/tmp-native-shadow-docs.py
          rm -f .github/workflows/tmp-native-shadow-docs.yml
      - name: Format canonical documentation
        run: >-
          npx prettier --write
          tracker.yml
          README.md
          .ai-bridge/current-plan.md
          .ai-bridge/implementation-status.md
          docs/testing/testing-strategy.md
      - run: npm run format:check
      - run: npm run db:check
      - name: Commit production documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: record native shadow rollout verification"
          git push origin HEAD:${{ github.head_ref }}
