name: Apply PostgreSQL restore integrity hardening

on:
  push:
    branches: [ai/postgres-restore-integrity-20260717]
    paths:
      - .github/workflows/apply-postgres-restore-integrity.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzyl_guard
          POSTGRES_PASSWORD: ozzyl_guard
          POSTGRES_DB: ozzyl_guard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ozzyl_guard -d ozzyl_guard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_test
      RESTORE_DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_restore_test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/postgres-restore-integrity-20260717
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: python3 scripts/tmp-finalize-restore-integrity.py
      - name: Verify credential-safe PostgreSQL tool invocation
        run: |
          grep -q "postgresToolConnection" packages/database/src/restore-rehearsal.ts
          ! grep -q "PGDATABASE: connectionUrl" packages/database/src/restore-rehearsal.ts
      - run: >-
          npx prettier --write
          package.json
          packages/database/package.json
          packages/database/migrations/manifest.json
          packages/database/src/migration-integrity.ts
          packages/database/src/migration-integrity.test.ts
          packages/database/src/migration-integrity.postgres.test.ts
          packages/database/src/migrate.ts
          packages/database/src/check-migrations.ts
          packages/database/src/check-database-integrity.ts
          packages/database/src/restore-rehearsal.ts
          .github/workflows/ci.yml
      - run: npm run lint
      - run: npm run db:check
      - run: npm run db:migrate
      - name: Verify migration replay
        run: npm run db:migrate
      - run: npm run db:integrity
      - run: >-
          psql postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/postgres
          --set ON_ERROR_STOP=1
          --command 'create database ozzyl_guard_restore_test'
      - run: pg_dump --version
      - run: pg_restore --version
      - run: npm run db:restore-rehearsal
      - run: npm run typecheck --workspace @ozzyl/database
      - run: npm run test --workspace @ozzyl/database
      - run: npm run build --workspace @ozzyl/database
      - name: Commit verified production sources
        run: |
          rm scripts/tmp-finalize-restore-integrity.py
          rm .github/workflows/apply-postgres-restore-integrity.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add PostgreSQL restore integrity checks"
          git push origin HEAD:ai/postgres-restore-integrity-20260717
