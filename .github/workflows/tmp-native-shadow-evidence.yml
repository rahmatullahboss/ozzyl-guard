name: Sync native shadow verification evidence

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'ai/native-shadow-evidence-20260718'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: python3 scripts/tmp-native-shadow-evidence.py
      - name: Remove temporary evidence tooling
        run: |
          rm -f scripts/tmp-native-shadow-evidence.py
          rm -f .github/workflows/tmp-native-shadow-evidence.yml
      - run: npx prettier --write tracker.yml .ai-bridge/current-plan.md .ai-bridge/implementation-status.md
      - run: npm run format:check
      - run: npm run db:check
      - name: Commit evidence-only diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: record native shadow verification evidence"
          git push origin HEAD:${{ github.head_ref }}
