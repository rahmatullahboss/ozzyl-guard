name: Apply worker lease docs

on:
  push:
    branches: [ai/worker-lease-recovery-20260717]
    paths:
      - scripts/tmp-worker-lease-docs.py
      - .github/workflows/apply-worker-lease-docs.yml
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  apply:
    if: github.head_ref == 'ai/worker-lease-recovery-20260717' || github.ref_name == 'ai/worker-lease-recovery-20260717'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/worker-lease-recovery-20260717
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund >/dev/null
      - run: python3 scripts/tmp-worker-lease-docs.py
      - run: npx prettier --write tracker.yml .ai-bridge/current-plan.md .ai-bridge/implementation-status.md .ai-bridge/decisions.md docs/testing/testing-strategy.md docs/database/database-design.md docker-compose.yml
      - name: Capture changed files
        run: git diff --name-only > worker-lease-docs-changed.txt
      - uses: actions/upload-artifact@v4
        with:
          name: worker-lease-formatted-docs
          path: |
            worker-lease-docs-changed.txt
            tracker.yml
            .ai-bridge/current-plan.md
            .ai-bridge/implementation-status.md
            .ai-bridge/decisions.md
            docs/testing/testing-strategy.md
            docs/database/database-design.md
            config/environment.example
            docker-compose.yml
