name: Format Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund >/dev/null
      - name: Format implementation status
        run: npx prettier --write .ai-bridge/implementation-status.md
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-implementation-status
          path: .ai-bridge/implementation-status.md
          if-no-files-found: error
