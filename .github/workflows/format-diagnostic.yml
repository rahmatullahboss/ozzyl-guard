name: Format Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund >/dev/null
      - name: Capture differently formatted files
        run: npx prettier --list-different . > format-files.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: format-files
          path: format-files.txt
          if-no-files-found: error
