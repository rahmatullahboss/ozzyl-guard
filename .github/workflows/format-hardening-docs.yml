name: Format hardening docs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'ai/postgres-concurrency-hardening-20260716'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/postgres-concurrency-hardening-20260716
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund >/dev/null
      - run: npx prettier --write tracker.yml .ai-bridge/current-plan.md .ai-bridge/implementation-status.md docs/testing/testing-strategy.md
      - name: Commit formatting when needed
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.yml .ai-bridge/current-plan.md .ai-bridge/implementation-status.md docs/testing/testing-strategy.md
          git commit -m "style: format PostgreSQL hardening docs"
          git push origin HEAD:ai/postgres-concurrency-hardening-20260716
