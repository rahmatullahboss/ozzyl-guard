name: Apply webhook outbox patch

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzyl_guard
          POSTGRES_PASSWORD: ozzyl_guard
          POSTGRES_DB: ozzyl_guard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ozzyl_guard -d ozzyl_guard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/webhook-outbox-runner-20260717
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: python3 scripts/tmp-webhook-outbox-patch.py
      - run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - run: npx prettier --write packages/encryption packages/database/src/schema.ts packages/database/migrations/0008_webhook_delivery_leases.sql workers/courier-session-worker/src/index.ts workers/courier-session-worker/package.json workers/event-worker apps/api/src/postgres.ts apps/api/src/postgres-concurrency.test.ts docker-compose.yml package-lock.json
      - run: npm run db:check
      - run: npm run db:migrate
      - name: Verify migration replay
        run: npm run db:migrate
      - run: npm run typecheck --workspace @ozzyl/encryption
      - run: npm run typecheck --workspace @ozzyl/courier-session-worker
      - run: npm run typecheck --workspace @ozzyl/event-worker
      - run: npm run typecheck --workspace @ozzyl/api
      - run: npm run test --workspace @ozzyl/encryption
      - run: npm run test --workspace @ozzyl/event-worker
      - run: npm run test --workspace @ozzyl/api
      - run: npm run build --workspace @ozzyl/encryption
      - run: npm run build --workspace @ozzyl/courier-session-worker
      - run: npm run build --workspace @ozzyl/event-worker
      - name: Commit verified webhook outbox source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            package-lock.json \
            packages/encryption \
            packages/database/migrations/0008_webhook_delivery_leases.sql \
            packages/database/src/schema.ts \
            workers/courier-session-worker/package.json \
            workers/courier-session-worker/src/index.ts \
            workers/event-worker/package.json \
            workers/event-worker/src/index.ts \
            workers/event-worker/src/index.test.ts \
            workers/event-worker/src/postgres.ts \
            workers/event-worker/src/postgres.test.ts \
            workers/event-worker/src/runner.ts \
            apps/api/src/postgres.ts \
            apps/api/src/postgres-concurrency.test.ts \
            config/environment.example \
            docker-compose.yml
          git commit -m "feat: add durable webhook outbox runner"
          git push origin HEAD:ai/webhook-outbox-runner-20260717
