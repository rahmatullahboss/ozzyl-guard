name: Format webhook outbox docs

on:
  push:
    branches: [ai/webhook-outbox-runner-20260717]
    paths:
      - .github/workflows/format-webhook-docs.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/webhook-outbox-runner-20260717
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx prettier --write tracker.yml .ai-bridge/current-plan.md .ai-bridge/implementation-status.md .ai-bridge/decisions.md docs/testing/testing-strategy.md docs/database/database-design.md docs/security/security-privacy.md docs/operations/operations-observability.md docs/operations/deployment.md
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.yml .ai-bridge/current-plan.md .ai-bridge/implementation-status.md .ai-bridge/decisions.md docs/testing/testing-strategy.md docs/database/database-design.md docs/security/security-privacy.md docs/operations/operations-observability.md docs/operations/deployment.md
          git commit -m "style: format webhook outbox documentation"
          git push origin HEAD:ai/webhook-outbox-runner-20260717
