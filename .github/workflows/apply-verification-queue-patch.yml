name: Apply verification queue patch

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'ai/verification-queue-runner-20260717'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ozzyl_guard
          POSTGRES_PASSWORD: ozzyl_guard
          POSTGRES_DB: ozzyl_guard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ozzyl_guard -d ozzyl_guard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ozzyl_guard:ozzyl_guard@localhost:5432/ozzyl_guard_test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: python3 scripts/tmp-verification-queue-patch.py
      - run: npm install --ignore-scripts --no-audit --no-fund
      - run: >-
          npx prettier --write
          packages/database/src/schema.ts
          packages/verification/src/index.ts
          apps/api/package.json
          apps/api/src/index.ts
          apps/api/src/index.test.ts
          apps/api/src/server.ts
          apps/api/src/postgres-verification.ts
          apps/api/src/postgres-concurrency.test.ts
          workers/verification-worker
          package-lock.json
      - run: npm run db:check
      - run: npm run db:migrate
      - name: Verify migration replay
        run: npm run db:migrate
      - run: npm run typecheck --workspace @ozzyl/verification
      - run: npm run typecheck --workspace @ozzyl/verification-worker
      - run: npm run typecheck --workspace @ozzyl/api
      - run: npx turbo run test --filter=@ozzyl/verification-worker
      - run: npx turbo run test --filter=@ozzyl/api
      - run: npm run build --workspace @ozzyl/verification
      - run: npm run build --workspace @ozzyl/verification-worker
      - run: npm run build --workspace @ozzyl/api
      - name: Commit verified verification queue source
        run: |
          rm scripts/tmp-verification-queue-patch.py
          rm .github/workflows/apply-verification-queue-patch.yml
          rm -f .ai-bridge/tmp-verification-worker-test.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add durable verification queue runner"
          git push origin HEAD:${{ github.head_ref }}
