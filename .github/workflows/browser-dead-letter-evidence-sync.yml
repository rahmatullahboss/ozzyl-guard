name: Browser Dead Letter Evidence Sync

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.ref == 'docs/browser-dead-letter-evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/browser-dead-letter-evidence
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply evidence sync
        id: evidence_sync
        continue-on-error: true
        run: |
          python3 .github/scripts/fix-browser-evidence-sync.py > browser-evidence-sync.log 2>&1
          python3 .github/scripts/sync-browser-dead-letter-evidence.py >> browser-evidence-sync.log 2>&1
      - name: Upload evidence sync output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-evidence-sync-output
          path: browser-evidence-sync.log
          if-no-files-found: error
      - name: Fail after captured sync error
        if: steps.evidence_sync.outcome == 'failure'
        run: exit 1
      - name: Format evidence
        run: |
          npx prettier --write tracker.yml
          npx prettier --write .ai-bridge/current-plan.md
          npx prettier --write .ai-bridge/implementation-status.md
          npx prettier --write .ai-bridge/decisions.md
          npx prettier --write .ai-bridge/pro-context.md
          npx prettier --write docs/README.md
      - name: Remove temporary evidence files
        run: |
          rm .github/workflows/browser-dead-letter-evidence-sync.yml
          rm .github/scripts/sync-browser-dead-letter-evidence.py
          rm .github/scripts/fix-browser-evidence-sync.py
          rm -f browser-evidence-sync.log
      - run: npm run format:check && npm run db:check
      - name: Commit evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: sync browser dead-letter evidence"
          git push origin HEAD:docs/browser-dead-letter-evidence
