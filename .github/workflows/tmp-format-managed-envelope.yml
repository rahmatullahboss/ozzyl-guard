name: Format managed envelope sources

on:
  push:
    branches: [ai/managed-envelope-boundary-20260717]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx prettier --write packages/encryption/src/index.ts packages/encryption/src/index.test.ts
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/encryption/src/index.ts packages/encryption/src/index.test.ts
          git commit -m "style: format managed envelope sources"
          git push origin HEAD:${{ github.ref_name }}
