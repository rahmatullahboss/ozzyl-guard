name: Format Export

on:
  push:
    branches: [feat/durable-work-dead-letter-operations]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-dead-letter-files
          if-no-files-found: error
          path: |
            README.md
            package.json
            docs/README.md
            docs/adr/README.md
            docs/adr/0012-durable-work-dead-letter-operations.md
            docs/database/durable-work-replay-ledger.md
            docs/operations/durable-work-dead-letter-runbook.md
            docs/testing/durable-work-dead-letter-testing.md
            packages/database/package.json
            packages/database/migrations/0012_durable_work_replays.sql
            packages/database/migrations/manifest.json
            packages/database/src/dead-letter-operations.postgres.test.ts
            packages/database/src/dead-letter-operations.ts
            packages/database/src/durable-work-operations-cli.ts
            packages/database/src/durable-work-schema.ts
            packages/database/src/index.ts
            packages/database/src/runtime-role.test.ts
            packages/database/src/runtime-role.ts
