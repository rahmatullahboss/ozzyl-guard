name: Browser Dead Letter Implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  implement:
    if: github.event.pull_request.head.ref == 'feat/browser-dead-letter-operations'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/browser-dead-letter-operations
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply implementation patch
        run: |
          python3 .github/scripts/apply-browser-dead-letter-operations.py
          python3 .github/scripts/fix-browser-dead-letter-runtime-import.py
      - name: Refresh workspace lockfile
        run: npm install --package-lock-only
      - run: npm run format
      - name: Shared types typecheck
        run: npm run typecheck -w @ozzyl/shared-types
      - name: API typecheck
        run: npm run typecheck -w @ozzyl/api
      - name: Dead-letter list browser test
        id: list_test
        continue-on-error: true
        run: npx vitest run apps/api/src/browser.test.ts -t "lists only secret-free dead letters" --reporter=verbose > browser-dead-letter-test.log 2>&1
      - name: Upload list test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-dead-letter-list-test
          path: browser-dead-letter-test.log
          if-no-files-found: error
      - name: Fail after captured list test
        if: steps.list_test.outcome == 'failure'
        run: exit 1
      - name: Dead-letter member rejection browser test
        run: npx vitest run apps/api/src/browser.test.ts -t "requires owner or admin membership" --reporter=verbose
      - name: Dead-letter replay browser test
        run: npx vitest run apps/api/src/browser.test.ts -t "requires CSRF and maps controlled replay" --reporter=verbose
      - name: Full browser API tests
        run: npx vitest run apps/api/src/browser.test.ts --reporter=verbose
      - name: Dashboard build
        run: npm run build -w @ozzyl/dashboard
      - name: Commit implementation
        run: |
          rm .github/workflows/browser-dead-letter-implementation.yml
          rm .github/scripts/apply-browser-dead-letter-operations.py
          rm .github/scripts/fix-browser-dead-letter-runtime-import.py
          rm -f browser-dead-letter-test.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add browser dead-letter operations"
          git push origin HEAD:feat/browser-dead-letter-operations
