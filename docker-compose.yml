services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ozzyl_guard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ozzyl_guard
    ports:
      - '5432:5432'
    volumes:
      - ozzyl_guard_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ozzyl_guard -d ozzyl_guard']
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ['npm', 'run', 'db:migrate']
    environment:
      DATABASE_URL: postgresql://ozzyl_guard:${POSTGRES_PASSWORD}@postgres:5432/ozzyl_guard
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://ozzyl_guard:${POSTGRES_PASSWORD}@postgres:5432/ozzyl_guard
      DATABASE_SSL: 'false'
      API_KEY_PEPPER: ${API_KEY_PEPPER:?API_KEY_PEPPER is required}
      SESSION_PEPPER: ${SESSION_PEPPER:?SESSION_PEPPER is required}
      SESSION_CSRF_SECRET: ${SESSION_CSRF_SECRET:?SESSION_CSRF_SECRET is required}
      PHONE_HMAC_KEY: ${PHONE_HMAC_KEY:?PHONE_HMAC_KEY is required}
      OTP_HASH_SECRET: ${OTP_HASH_SECRET:?OTP_HASH_SECRET is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY_VERSION: ${CREDENTIAL_ENCRYPTION_KEY_VERSION:-v1}
    ports:
      - '3000:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  courier-session-worker:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ozzyl_guard:${POSTGRES_PASSWORD}@postgres:5432/ozzyl_guard
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY_VERSION: ${CREDENTIAL_ENCRYPTION_KEY_VERSION:-v1}
      COURIER_SESSION_REFRESH_HOURS: ${COURIER_SESSION_REFRESH_HOURS:-6}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  courier-sync-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ['node', 'workers/courier-sync-worker/dist/runner.js']
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ozzyl_guard:${POSTGRES_PASSWORD}@postgres:5432/ozzyl_guard
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY_VERSION: ${CREDENTIAL_ENCRYPTION_KEY_VERSION:-v1}
      WORKER_ID: ${WORKER_ID:-courier-sync-local}
      WORKER_POLL_MS: ${WORKER_POLL_MS:-5000}
      WORKER_LEASE_MS: ${WORKER_LEASE_MS:-300000}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  verification-worker:
    profiles: ['verification']
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ['node', 'workers/verification-worker/dist/runner.js']
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ozzyl_guard:${POSTGRES_PASSWORD}@postgres:5432/ozzyl_guard
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY_VERSION: ${CREDENTIAL_ENCRYPTION_KEY_VERSION:-v1}
      PHONE_HMAC_KEY: ${PHONE_HMAC_KEY:?PHONE_HMAC_KEY is required}
      OTP_HASH_SECRET: ${OTP_HASH_SECRET:?OTP_HASH_SECRET is required}
      OTP_PROVIDER_MODULE: ${OTP_PROVIDER_MODULE:-}
      OTP_SENDER_ID: ${OTP_SENDER_ID:-}
      OTP_PROVIDER_API_KEY: ${OTP_PROVIDER_API_KEY:-}
      VERIFICATION_WORKER_ID: ${VERIFICATION_WORKER_ID:-verification-local}
      VERIFICATION_WORKER_POLL_MS: ${VERIFICATION_WORKER_POLL_MS:-5000}
      VERIFICATION_WORKER_LEASE_MS: ${VERIFICATION_WORKER_LEASE_MS:-60000}
      VERIFICATION_WORKER_MAX_ATTEMPTS: ${VERIFICATION_WORKER_MAX_ATTEMPTS:-5}
      OTP_PROVIDER_TIMEOUT_MS: ${OTP_PROVIDER_TIMEOUT_MS:-10000}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  event-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ['node', 'workers/event-worker/dist/runner.js']
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ozzyl_guard:${POSTGRES_PASSWORD}@postgres:5432/ozzyl_guard
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY_VERSION: ${CREDENTIAL_ENCRYPTION_KEY_VERSION:-v1}
      EVENT_WORKER_ID: ${EVENT_WORKER_ID:-event-local}
      EVENT_WORKER_POLL_MS: ${EVENT_WORKER_POLL_MS:-5000}
      EVENT_WORKER_LEASE_MS: ${EVENT_WORKER_LEASE_MS:-60000}
      EVENT_WORKER_MAX_ATTEMPTS: ${EVENT_WORKER_MAX_ATTEMPTS:-5}
      WEBHOOK_TIMEOUT_MS: ${WEBHOOK_TIMEOUT_MS:-5000}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ozzyl_guard_postgres:
